name = "budget-website-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Public, non-secret config. Set GOOGLE_CLIENT_ID via `wrangler secret put` for production
# if you'd rather not commit it; for the OAuth audience-check it's not strictly secret.
[vars]
ALLOWED_EMAIL = "francescoceruzzi@gmail.com"
ALLOWED_ORIGIN = "http://localhost:5173"
GOOGLE_CLIENT_ID = "REPLACE_WITH_OAUTH_CLIENT_ID"

# Run `wrangler d1 create budget` and paste the resulting database_id here.
[[d1_databases]]
binding = "DB"
database_name = "budget"
database_id = "REPLACE_AFTER_wrangler_d1_create"
migrations_dir = "migrations"
