name: password_manager
description: "Gestore di credenziali offline-first KeePass-compatible per Android."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # KeePass / KDBX
  kdbx: ^2.4.2

  # Crypto
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  cryptography: ^2.7.0

  # Localization
  intl: ^0.20.2

  # Storage / file
  path_provider: ^2.1.3
  file_picker: ^8.0.6
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Biometrics
  local_auth: ^2.2.0
  local_auth_android: ^1.0.39

  # TOTP / OTP
  otp: ^3.1.4
  base32: ^2.1.3

  # PDF / CSV export
  pdf: ^3.11.0
  printing: ^5.13.1
  csv: ^6.0.0

  # Utility
  collection: ^1.18.0
  uuid: ^4.4.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/wordlists/
